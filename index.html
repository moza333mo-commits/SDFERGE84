<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الإدارة</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
        }
        .card {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        h2 { margin-top: 0; color: #555; font-size: 24px; }
        .balance-container {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        .balance {
            font-size: 40px;
            font-weight: bold;
            color: #27ae60;
            margin: 0;
            direction: ltr;
        }
        .balance.negative { color: #c0392b; }
        .time { font-size: 12px; color: #888; margin-top: 15px; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card">
        <h2>💰 رصيد الصندوق الحالي</h2>
        
        <div class="balance-container">
            <div id="loading" class="spinner"></div>
            <p id="amount" class="balance" style="display:none;"></p>
        </div>
        
        <div id="last-update" class="time">جاري التحديث...</div>
    </div>

    <script>
        // رابط جوجل السري الخاص بك
        const URL = "https://script.google.com/macros/s/AKfycbyvLZ4QstWPfjjqN8ewYyIXGmeAGXtnOZOMDJ6aCT3Rkq_t8m91mZKwbYHnjuuBFis/exec";

        fetch(URL)
            .then(response => response.json())
            .then(data => {
                const amountEl = document.getElementById('amount');
                const loadingEl = document.getElementById('loading');
                const updateEl = document.getElementById('last-update');
                
                loadingEl.style.display = 'none';
                amountEl.style.display = 'block';
                
                let balanceValue = parseFloat(data.balance);
                amountEl.innerText = balanceValue.toLocaleString('en-US');
                
                if(balanceValue < 0) amountEl.classList.add('negative');
                
                let date = new Date(data.time);
                updateEl.innerText = "آخر تحديث: " + date.toLocaleTimeString('ar-EG');
            })
            .catch(error => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('amount').style.display = 'block';
                document.getElementById('amount').innerText = "خطأ في الاتصال";
                document.getElementById('amount').style.color = "red";
            });
    </script>
</body>
</html>
